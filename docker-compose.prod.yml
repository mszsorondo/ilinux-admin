services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: campus_user
      POSTGRES_PASSWORD: "awIt7[;SMGeIk7"
      POSTGRES_DB: campus_il_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ilinux/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_user -d campus_il_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./ilinux
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://campus_user:awIt7%5B%3BSMGeIk7@db:5432/campus_il_db
      JWT_SECRET: ${JWT_SECRET}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      NEXT_PUBLIC_BASE_URL: https://campus.institutolinux.com
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  admin:
    build: ./ilinux-admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://campus_user:awIt7%5B%3BSMGeIk7@db:5432/campus_il_db
      JWT_SECRET: ${ADMIN_JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
